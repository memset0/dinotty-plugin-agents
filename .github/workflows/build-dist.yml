name: Build and publish dist

# Source lives on `main` (no dist/ committed). On every push to main this
# workflow builds the plugin with pnpm and force-pushes the installable
# artifacts (plugin.json + styles.css + dist/) to the dedicated `dist` branch.
# Online install points at the `dist` branch.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-dist-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Assemble installable set
        run: |
          rm -rf out && mkdir -p out
          cp -r dist out/dist
          cp plugin.json styles.css out/
          [ -f README.md ] && cp README.md out/ || true

      - name: Publish to dist branch
        run: |
          cd out
          git init -q -b dist
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "build: ${GITHUB_SHA::7} from main"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
